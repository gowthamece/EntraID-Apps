# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Blazor Web App to Azure App Service - EntraID-FunctionApp-Client

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  AZURE_WEBAPP_PACKAGE_PATH: 'EntraID-FunctionApp-Client' # set this to the path to your web app project
  DOTNET_VERSION: '10.0.x' # set this to the dotnet version to use

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Build and Publish Project'
        shell: bash
        run: |
          pushd './${{ env.AZURE_WEBAPP_PACKAGE_PATH }}'
          dotnet publish --configuration Release --output ./output
          popd

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/output'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A23F19A4FD964322849D651A08F2D2A6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0D74E0729B9D47B9AD2FE5CD9B3D35E2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3549B86C252244849EFA817E48585FA2 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'func-entraid-dev-eus01'
          slot-name: 'Production'
          package: .
          